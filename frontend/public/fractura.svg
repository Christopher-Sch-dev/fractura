<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" fill="none">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- F -->
  <text x="0" y="32" font-family="'Bebas Neue', sans-serif" font-size="36" fill="#00e5ff" filter="url(#glow)">FRACTURA</text>
  <!-- underline accent -->
  <line x1="0" y1="38" x2="110" y2="38" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- broken corner accent -->
  <line x1="110" y1="35" x2="120" y2="40" stroke="#ff1a1a" stroke-width="2"/>
</svg>